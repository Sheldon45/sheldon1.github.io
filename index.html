<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ресторан по простому | рецепты</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: #f9f5ed;  
      color: #3e4a3f;              
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    .navbar {
      background-color: #d9d0b5;   
      padding: 1.2rem 2rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
      border-bottom: 1px solid #c0b79b;
    }

    .nav-links {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      justify-content: center;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 400;
      color: #2e3b2f;
      padding: 0.4rem 0.2rem;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.3px;
    }

    .nav-links a:hover {
      border-bottom-color: #7f8f7a;
      color: #1f2a20;
    }


    .container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      flex: 1;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 350;
      margin-bottom: 2rem;
      color: #4a5b4b;
      border-left: 5px solid #b8b094;
      padding-left: 1.2rem;
    }

    h2 {
      font-weight: 350;
      color: #5b6d5c;
      margin: 1.8rem 0 1rem 0;
      font-size: 1.8rem;
    }

    h3 {
      font-weight: 400;
      color: #5a6a4f;
      margin-bottom: 0.5rem;
      font-size: 1.3rem;
    }


    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 2rem;
      margin-top: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background-color: #ffffffda;
      backdrop-filter: blur(2px);
      border-radius: 22px;
      padding: 1.6rem 1.4rem;
      box-shadow: 0 8px 18px -8px rgba(80, 70, 50, 0.12);
      border: 1px solid #e4dbc6;
      transition: transform 0.2s ease, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 24px -10px rgba(70, 60, 40, 0.15);
      border-color: #cbc2a8;
    }

    .card p {
      color: #4e5747;
      margin-top: 0.4rem;
    }

   
    .recipe-link {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
      width: 100%;
    }
    
    .recipe-link:hover h3 {
      color: #8a7b5a;
      text-decoration: underline;
      text-decoration-color: #b8b094;
      text-underline-offset: 4px;
    }

    .stars {
      color: #b79b5f;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin: 0.5rem 0 0.2rem;
    }

    hr {
      border: none;
      border-top: 1px solid #d6cdb5;
      margin: 2rem 0;
    }

   
    .about-card {
      background: #fffcf4;
      border-radius: 32px;
      padding: 2.2rem 2.5rem;
      border: 1px solid #d9cfb6;
      max-width: 700px;
      margin: 2rem 0;
      box-shadow: 0 6px 18px #ece3d2;
    }

    .about-field {
      display: flex;
      align-items: baseline;
      padding: 0.9rem 0;
      border-bottom: 1px dashed #d0c4aa;
    }

    .about-field:last-child {
      border-bottom: none;
    }

    .field-label {
      width: 160px;
      font-weight: 400;
      color: #6b7a66;
      font-size: 1.2rem;
    }

    .field-value {
      flex: 1;
      color: #364336;
      font-size: 1.3rem;
      font-weight: 330;
      padding-left: 0.5rem;
    }

    .avatar-placeholder {
      width: 100px;
      height: 100px;
      background-color: #d0c7b1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
      font-size: 2.8rem;
      color: #726b54;
      border: 3px solid #fff3e0;
    }

  
    .badge-star {
      background-color: #c5bc9f;
      color: #2b3829;
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 0.8rem;
      letter-spacing: 0.5px;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #8e9a89;
      border-top: 1px solid #d6cdb5;
      margin-top: 2rem;
      background-color: #ece3d2a0;
      font-size: 0.95rem;
    }

  
    @media (max-width: 600px) {
      .nav-links { gap: 1rem; }
      .about-field { flex-direction: column; align-items: flex-start; gap: 0.3rem; }
      .field-label { width: auto; }
    }
  </style>
</head>
<body>
  
  <nav class="navbar">
    <div class="nav-links">
      <a href="#home" data-page="home">Главная</a>
      <a href="#starred" data-page="starred">Рецепты со звездочкой</a>
      <a href="#tools" data-page="tools">Чем готовим</a>
      <a href="#about" data-page="about">Об авторе</a>
    </div>
  </nav>

  
  <main class="container" id="page-content">
    
  </main>

  <footer>
    <p>ресторан по простому · уютная еда для своих</p>
  </footer>

  <script>
    (function() {
     
      const content = {
     
        home: {
          title: 'Домашние рецепты',
          items: [
            { name: 'Картофель запечённый с розмарином', time: '45 мин', сложность: 'легко', url: 'https://cookslab.ru/kartofel-zapechennyy-s-rozmarinom/' },
            { name: 'Суп-пюре из тыквы', time: '35 мин', сложность: 'легко', url: 'https://www.gotovim.ru/recepts/soups/cabbage/11028.shtml' },
            { name: 'Паста с томатами и базиликом', time: '25 мин', сложность: 'легко', url: 'https://m.patee.ru/recipes/pasta/view/?id=1493076' },
            { name: 'Овсяная каша с яблоком и корицей', time: '15 мин', сложность: 'легко', url: 'https://www.russianfood.com/recipes/recipe.php?rid=142881' },
            { name: 'Салат с огурцом и мятой', time: '10 мин', сложность: 'легко', url: 'https://www.gastronom.ru/recipe/28551/salat-s-ogurcami-i-mjatoj' }
          ]
        },

        starred: {
          title: 'Рецепты ★ (требуют мастерства)',
          items: [
            { name: 'Домашняя лазанья бешамель', time: '2.5 ч', сложность: 'сложно', url: 'https://retspty.ru/goryachee/lazanya/domashnyaya-myasnaya-lazanya-s-sousom-beshamel' },
            { name: 'Утка с апельсиновым соусом', time: '3 ч', сложность: 'сложно', url: 'https://www.gastronom.ru/recipe/30682/utka-s-apelsinovym-sousom-katerina-medichi' },
            { name: 'Булочки с заварным кремом (ромовая баба)', time: '4 ч', сложность: 'сложно', url: 'https://povarenok.ru/recipes/show/86962/' },
            { name: 'Рыбный пирог с муссом из щуки', time: '2 ч', сложность: 'сложно', url: 'https://www.edimdoma.ru/retsepty/100069-rybnyy-pirog-s-sigom' },
            { name: 'Торт «Три шоколада» с зеркальной глазурью', time: '5 ч', сложность: 'сложно', url: 'https://www.gastronom.ru/recipe/41065/tort-tri-shokolada' }
          ]
        },
      
        tools: {
          title: 'Кухонные инструменты · любимые модели',
          items: [
            { tool: 'Нож шеф-повара', model: 'Wüsthof Classic 20 см', особенность: 'идеальный баланс' },
            { tool: 'Сковорода антипригарная', model: 'Tefal Ingenio', особенность: 'съёмная ручка' },
            { tool: 'Чугунный вок', model: 'Lodge 35 см', особенность: 'китайская классика' },
            { tool: 'Кухонные весы', model: 'MyWeight KD-8000', особенность: 'точность до 0.1 г' },
            { tool: 'Мясорубка электрическая', model: 'Kenwood MG510', особенность: 'насадка для кеббе' }
          ]
        },
      
        about: {
          name: 'Власов Владислав',
          age: '17 лет',
          experience: 'готовлю с 2020 года (6 лет)',
          location: 'Воронеж'
        }
      };

     
      function renderHomeOrStarred(pageId) {
        const data = content[pageId];
        let html = `<h1>${data.title}</h1>`;
        html += `<div class="card-grid">`;
        data.items.forEach(item => {
         
          html += `<div class="card">`;
          html += `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="recipe-link">`;
          if (pageId === 'starred') html += `<div class="badge-star">⭐ сложный рецепт</div>`;
          html += `<h3>${item.name}</h3>`;
          html += `<p>⏱️ ${item.time || '—'}</p>`;
          if (item.сложность) html += `<p style="color:#7a8873;">${item.сложность}</p>`;
          if (pageId === 'starred') html += `<div class="stars">★ ★ ★ ☆</div>`; 
          else html += `<div style="margin-top:0.3rem; color:#aa9f86;">● спокойный ужин</div>`;
          html += `</a>`;
          html += `</div>`;
        });
        html += `</div>`;
        if (pageId === 'starred') {
          html += `<p style="color:#6c5f4b; margin-top:1rem;">* блюда со звёздочкой требуют чуть больше внимания, но результат стоит</p>`;
        }
        return html;
      }


      function renderTools() {
        const data = content.tools;
        let html = `<h1>${data.title}</h1>`;
        html += `<div class="card-grid">`;
        data.items.forEach(item => {
          html += `<div class="card" style="background:#faf7f0;">`;
          html += `<h3>${item.tool}</h3>`;
          html += `<p style="font-size:1.2rem; font-weight:300;">${item.model}</p>`;
          html += `<p style="color:#766f5a;">🔹 ${item.особенность}</p>`;
          html += `</div>`;
        });
        html += `</div>`;
        html += `<hr><p style="color:#6f7a67;">⋆ проверено годами ⋆ каждая модель не раз выручала на кухне</p>`;
        return html;
      }

      function renderAbout() {
        const a = content.about;
        let html = `<h1>Об авторе</h1>`;
        html += `<div class="about-card">`;
        html += `<div class="avatar-placeholder">👨‍🍳</div>`;
        html += `<div class="about-field"><span class="field-label">имя / фамилия</span><span class="field-value">${a.name}</span></div>`;
        html += `<div class="about-field"><span class="field-label">возраст</span><span class="field-value">${a.age}</span></div>`;
        html += `<div class="about-field"><span class="field-label">готовлю всего</span><span class="field-value">${a.experience}</span></div>`;
        html += `<div class="about-field"><span class="field-label">город</span><span class="field-value">${a.location}</span></div>`;
        html += `</div>`;
        html += `<p style="color:#7d8a7a; margin-top:1.5rem;">✎ готовлю просто и с душой</p>`;
        return html;
      }

  
      function navigateToPage(pageId) {
        let htmlString = '';
        if (pageId === 'home' || pageId === 'starred') {
          htmlString = renderHomeOrStarred(pageId);
        } else if (pageId === 'tools') {
          htmlString = renderTools();
        } else if (pageId === 'about') {
          htmlString = renderAbout();
        } else {
          htmlString = `<h1>404</h1><p>страница не найдена</p>`;
        }

        const container = document.getElementById('page-content');
        if (container) container.innerHTML = htmlString;

      
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.style.fontWeight = '400';
          link.style.borderBottomColor = 'transparent';
          if (link.dataset.page === pageId) {
            link.style.fontWeight = '500';
            link.style.borderBottomColor = '#7f8f7a';
          }
        });

       
        window.location.hash = pageId;
      }


      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const page = link.dataset.page;
          if (page) navigateToPage(page);
        });
      });


      function loadPageFromHash() {
        let hash = window.location.hash.slice(1);
        if (!hash || !['home','starred','tools','about'].includes(hash)) {
          hash = 'home';
        }
        navigateToPage(hash);
      }

      window.addEventListener('load', loadPageFromHash);
      window.addEventListener('hashchange', loadPageFromHash);
    })();
  </script>
</body>
</html>
